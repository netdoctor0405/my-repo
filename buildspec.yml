version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 14
    commands:
      - npm install
  build:
    commands:
      - npm run build
  post_build:
    commands:
      - echo Preparing deployment artifacts...
      - mkdir -p /output
      - cp -r * /output/
artifacts:
  files:
    - /output/**
